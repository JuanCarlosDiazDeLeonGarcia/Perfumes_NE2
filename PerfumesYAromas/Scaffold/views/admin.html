<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfumes & Aromas</title>
    <link rel="stylesheet" href="../css/base.css"> 
</head>
<body>
    <div id="navbar-container"></div>
    <script>
        // Cargar navbar
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                initializeDropdown(); // ← Inicializar dropdown después de cargar
            })
            .catch(error => console.error('Error loading navbar:', error));

        // Función para inicializar el dropdown
        function initializeDropdown() {
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownContent = document.querySelector('.dropdown-content');

            if (dropdownBtn && dropdownContent) {
                dropdownBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    dropdownContent.classList.toggle('show');
                });

                // Cerrar dropdown al hacer click fuera
                document.addEventListener('click', function() {
                    dropdownContent.classList.remove('show');
                });

                // Prevenir que se cierre al hacer click dentro del dropdown
                dropdownContent.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
        }
    </script>

    <!-- Login de Administrador -->
    <div class="content">
        <div class="admin-container">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828506.png" alt="Admin">
            <h2>Acceso de Administrador</h2>
            <p class="acceso">⚠️ Acceso restringido. Solo personal autorizado.</p>
            <form>
                <input type="text" placeholder="Usuario Administrador" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit">Entrar al Panel</button>
            </form>
            <p style="margin-top:15px;">
                <a href="menuadmin.html" style="text-decoration:none; color: inherit;">
                    <button>¿Olvidaste tu constraseña?</button>
                </a>

            </p>
        </div>
    </div>

</body>
</html>
