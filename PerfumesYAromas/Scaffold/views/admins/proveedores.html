<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Proveedores</title>
    
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/usuarios.css">
</head>
<body>

<!-- Menú lateral -->
<aside class="sidebar">
    <h2>🌸 PerfumeShop</h2>
    <nav>
        <a href="paneladmin.html">📊 Dashboard</a>
        <a href="perfumesadmin.html">🧴 Perfumes</a>
        <a href="ventasadmin.html">🛍️ Ventas</a>
        <a href="clientesadmin.html">👥 Clientes</a>
        <a href="metricasadmin.html">📊 Métricas</a>
        <a href="proveedores.html" class="active">🚚 Proveedores</a>
        <a href="#" onclick="cerrarSesion()">🚪 Cerrar Sesión</a>
    </nav>
</aside>

<!-- ===== CONTENIDO PRINCIPAL ===== -->
<main class="main-content">

<div class="usuarios-container">

    <div class="usuarios-header">
        <h1>Gestión de Proveedores</h1>
        <button class="btn-nuevo-usuario" onclick="mostrarFormularioNuevo()">➕ Nuevo Proveedor</button>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="modalProveedor" class="modal">
        <div class="modal-contenido">
            <div class="modal-header">
                <h2>Proveedor</h2>
                <button class="btn-cerrar" onclick="cerrarModal()">×</button>
            </div>

            <div class="modal-body">

                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre">
                </div>

                <div class="form-group">
                    <label>Contacto *</label>
                    <input type="text" id="contacto">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label>Teléfono *</label>
                    <div class="telefono-container">
                        <span class="lada-fija">+52</span>
                        <input type="tel" id="telefono" placeholder="449-123-4567">
                    </div>
                </div>

                <div class="form-group">
                    <label>Ciudad *</label>
                    <input type="text" id="ciudad">
                </div>

                <div class="form-group">
                    <label>País *</label>
                    <input type="text" id="pais">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-guardar" onclick="guardarProveedor()">Guardar</button>
            </div>

        </div>
    </div>

    <!-- ===== TABLA ===== -->
    <div class="tabla-usuarios">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Contacto</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                    <th>País</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProveedores"></tbody>
        </table>
    </div>

</div>

</main>

<!-- ===== SCRIPTS ===== -->
<script src="../../js/proveedores.js"></script>

<script>
function cerrarSesion() {
    const confirmar = confirm("¿Seguro que quieres cerrar sesión?");
    if (confirmar) {
        sessionStorage.clear();
        localStorage.removeItem("adminLogueado");
        window.location.href = "/views/catalog.html";
    }
}
</script>

</body>
</html>
