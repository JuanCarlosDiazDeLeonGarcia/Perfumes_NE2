<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Perfumes & Aromas</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/menuusuario.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="https://via.placeholder.com/32?text=P&A" type="image/x-icon">
    <style>
        /* ESTILOS ESPECÍFICOS PARA LA PÁGINA DE REGISTRO */
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
        }

        .content {
            padding-top: 90px;
            text-align: center;
        }

        /* Estilos del formulario de registro */
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

            .register-container h2 {
                margin-bottom: 20px;
                color: #333;
            }

            .register-container .form-row {
                display: flex;
                gap: 15px;
                margin-bottom: 10px;
            }

            .register-container .form-group {
                flex: 1;
                text-align: left;
            }

            .register-container label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
                color: #555;
                font-size: 0.9rem;
            }

            .register-container input,
            .register-container select {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 1rem;
                box-sizing: border-box;
            }

                .register-container input:focus,
                .register-container select:focus {
                    outline: none;
                    border-color: #7e57c2;
                    box-shadow: 0 0 0 2px rgba(126, 87, 194, 0.2);
                }

            .register-container button {
                width: 100%;
                background: linear-gradient(90deg, purple, blue);
                color: white;
                padding: 12px;
                font-size: 1rem;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.3s;
                font-weight: bold;
                margin-top: 20px;
            }

                .register-container button:hover {
                    background: linear-gradient(90deg, darkmagenta, darkblue);
                }

            .register-container p {
                margin-top: 15px;
                font-size: 0.9rem;
            }

            .register-container a {
                color: blue;
                text-decoration: none;
                font-weight: bold;
            }

                .register-container a:hover {
                    text-decoration: underline;
                }

        /* Mensajes de error y éxito */
        .error-message {
            color: red;
            background-color: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            color: green;
            background-color: #e6ffe6;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Checkbox de términos */
        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            margin-top: 15px;
            text-align: left;
        }

            .terms-checkbox input {
                width: auto;
                margin-right: 10px;
                margin-top: 5px;
            }

            .terms-checkbox label {
                font-weight: normal;
                font-size: 0.85rem;
                line-height: 1.4;
            }

        .terms-link {
            color: #7e57c2;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Asegurar que el navbar importado se vea bien */
        #navbar-container .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .register-container .form-row {
                flex-direction: column;
                gap: 10px;
            }

            .register-container {
                margin: 30px 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Contenedor para el navbar importado -->
    <div id="navbar-container"></div>

    <!-- Contenido principal -->
    <div class="content">
        <div class="register-container">
            <h2>Crear Cuenta</h2>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre completo *</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="correo">Correo electrónico *</label>
                        <input type="email" id="correo" placeholder="ejemplo@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="449-123-4567">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Contraseña *</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar contraseña *</label>
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="empresa">Empresa (opcional)</label>
                        <input type="text" id="empresa" placeholder="Nombre de tu empresa">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" placeholder="Calle y número">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" placeholder="Ciudad">
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" placeholder="Estado">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="codigoPostal">Código Postal</label>
                        <input type="text" id="codigoPostal" placeholder="Código Postal">
                    </div>
                    <div class="form-group">
                        <label for="genero">Género (opcional)</label>
                        <select id="genero">
                            <option value="">Seleccionar</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                            <option value="Prefiero no decir">Prefiero no decir</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fechaNacimiento">Fecha de nacimiento (opcional)</label>
                        <input type="date" id="fechaNacimiento">
                    </div>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="acceptTerms" required>
                    <label for="acceptTerms">
                        Acepto los <span class="terms-link" onclick="mostrarTerminos()">términos y condiciones</span>
                        y la <span class="terms-link" onclick="mostrarPrivacidad()">política de privacidad</span> *
                    </label>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="newsletter">
                    <label for="newsletter">
                        Deseo recibir ofertas especiales y novedades por correo electrónico
                    </label>
                </div>

                <button type="submit" id="registerBtn">Crear Cuenta</button>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
            </form>
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script>
        // URL base del servidor
        const API_BASE_URL = 'http://localhost:3000';

        // Cargar navbar
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                initializeDropdown();
            })
            .catch(error => console.error('Error loading navbar:', error));

        // Función para inicializar el dropdown
        function initializeDropdown() {
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownContent = document.querySelector('.dropdown-content');

            if (dropdownBtn && dropdownContent) {
                dropdownBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    dropdownContent.classList.toggle('show');
                });

                // Cerrar dropdown al hacer click fuera
                document.addEventListener('click', function () {
                    dropdownContent.classList.remove('show');
                });

                // Prevenir que se cierre al hacer click dentro del dropdown
                dropdownContent.addEventListener('click', function (e) {
                    e.stopPropagation();
                });
            }
        }

        // Función para mostrar mensajes de error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Función para mostrar mensajes de éxito
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Validar formulario
        function validarFormulario() {
            const nombre = document.getElementById('nombre').value.trim();
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const acceptTerms = document.getElementById('acceptTerms').checked;

            // Validaciones básicas
            if (!nombre) {
                showError('Por favor, ingresa tu nombre completo.');
                return false;
            }

            if (!correo || !correo.includes('@')) {
                showError('Por favor, ingresa un correo electrónico válido.');
                return false;
            }

            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres.');
                return false;
            }

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden.');
                return false;
            }

            if (!acceptTerms) {
                showError('Debes aceptar los términos y condiciones.');
                return false;
            }

            return true;
        }

        // Formatear datos para enviar
        function obtenerDatosRegistro() {
            return {
                nombre: document.getElementById('nombre').value.trim(),
                correo: document.getElementById('correo').value.trim(),
                password: document.getElementById('password').value,
                telefono: document.getElementById('telefono').value.trim() || null,
                empresa: document.getElementById('empresa').value.trim() || null,
                direccion: document.getElementById('direccion').value.trim() || null,
                ciudad: document.getElementById('ciudad').value.trim() || null,
                estado: document.getElementById('estado').value.trim() || null,
                codigo_postal: document.getElementById('codigoPostal').value.trim() || null,
                genero: document.getElementById('genero').value || null,
                fecha_nacimiento: document.getElementById('fechaNacimiento').value || null,
                newsletter: document.getElementById('newsletter').checked
            };
        }

        // Función para manejar el registro
        async function handleRegister(event) {
            event.preventDefault();

            // Validar formulario
            if (!validarFormulario()) {
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            const originalText = registerBtn.textContent;

            // Mostrar estado de carga
            registerBtn.textContent = 'Creando cuenta...';
            registerBtn.classList.add('loading');

            try {
                const datosCliente = obtenerDatosRegistro();

                console.log('📤 Enviando datos de registro:', datosCliente);

                const response = await fetch(`${API_BASE_URL}/api/registrar-cliente`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(datosCliente)
                });

                const data = await response.json();

                if (response.ok) {
                    // Registro exitoso
                    showSuccess('✅ ¡Cuenta creada exitosamente! Redirigiendo...');

                    // Guardar datos del cliente en localStorage
                    localStorage.setItem('cliente', JSON.stringify(data.cliente));
                    localStorage.setItem('token', data.token || 'cliente_authenticated');
                    localStorage.setItem('userType', 'cliente');

                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'usuariomenu.html';
                    }, 2000);

                } else {
                    // Error en el registro
                    showError(data.message || 'Error al crear la cuenta. Intenta nuevamente.');

                    // Restaurar botón
                    registerBtn.textContent = originalText;
                    registerBtn.classList.remove('loading');
                }

            } catch (error) {
                console.error('Error en registro:', error);
                showError('Error de conexión. Verifica tu conexión a internet.');

                // Restaurar botón
                registerBtn.textContent = originalText;
                registerBtn.classList.remove('loading');
            }
        }

        // Funciones para mostrar términos y privacidad
        function mostrarTerminos() {
            alert('TÉRMINOS Y CONDICIONES\n\n' +
                '1. Aceptación de términos\n' +
                'Al registrarte en Perfumes & Aromas, aceptas cumplir con estos términos.\n\n' +
                '2. Uso de la cuenta\n' +
                'Eres responsable de mantener la confidencialidad de tu cuenta y contraseña.\n\n' +
                '3. Compras y pagos\n' +
                'Los precios están en pesos mexicanos e incluyen IVA cuando aplica.\n\n' +
                '4. Envíos y entregas\n' +
                'Los tiempos de entrega son estimados y pueden variar.\n\n' +
                '5. Devoluciones\n' +
                'Consulta nuestra política de devoluciones en la sección correspondiente.');
        }

        function mostrarPrivacidad() {
            alert('POLÍTICA DE PRIVACIDAD\n\n' +
                '1. Información que recopilamos\n' +
                'Recopilamos información personal que nos proporcionas al registrarte.\n\n' +
                '2. Uso de la información\n' +
                'Utilizamos tu información para procesar pedidos y mejorar tu experiencia.\n\n' +
                '3. Protección de datos\n' +
                'Implementamos medidas de seguridad para proteger tu información.\n\n' +
                '4. Cookies\n' +
                'Utilizamos cookies para mejorar la funcionalidad del sitio.\n\n' +
                '5. Terceros\n' +
                'No compartimos tu información con terceros sin tu consentimiento.');
        }

        // Validar contraseñas en tiempo real
        document.getElementById('confirmPassword').addEventListener('input', function () {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;

            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = 'red';
            } else {
                this.style.borderColor = '#ccc';
            }
        });

        // Validar email en tiempo real
        document.getElementById('correo').addEventListener('blur', function () {
            const email = this.value.trim();
            if (email && !email.includes('@')) {
                this.style.borderColor = 'red';
                showError('Ingresa un correo electrónico válido.');
            } else {
                this.style.borderColor = '#ccc';
            }
        });

        // Verificar si ya hay una sesión activa
        function checkExistingSession() {
            const cliente = localStorage.getItem('cliente');
            const userType = localStorage.getItem('userType');

            if (cliente && userType === 'cliente') {
                // Si ya hay sesión, redirigir al menú
                window.location.href = 'usuariomenu.html';
            }
        }

        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function () {
            // Verificar sesión existente
            checkExistingSession();

            // Asignar evento al formulario
            document.getElementById('registerForm').addEventListener('submit', handleRegister);

            // Permitir enviar con Enter
            const inputs = document.querySelectorAll('#registerForm input');
            inputs.forEach(input => {
                input.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('registerBtn').click();
                    }
                });
            });

            // Fecha máxima para fecha de nacimiento (18+ años)
            const today = new Date();
            const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
            document.getElementById('fechaNacimiento').max = maxDate.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
