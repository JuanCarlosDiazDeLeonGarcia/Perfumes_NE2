<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración - Administradores</title>
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>

  <!-- Menú lateral -->
  <aside class="sidebar">
    <h2>🌸 PerfumeShop</h2>
    <nav>
      <a href="menuadmin.html">📊 Dashboard</a>
      <a href="perfumesadmin.html">🧴 Perfumes</a>
      <a href="ventasadmin.html">💰 Ventas</a>
      <a href="clientesadmin.html">👥 Clientes</a>
       <a href="metricasadmin.html">📊 Métricas</a>
      <a href="#" class="active">⚙️ Configuración</a>

    </nav>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">
    <header class="admin-header">
      <h1>Gestión de Administradores</h1>
      <div class="admin-actions">
        <a href="admin.html" style="text-decoration:none; color: inherit;">
          <button class="btn-sesion">Cerrar Sesión</button>
        </a>
      </div>
    </header>

    <!-- Tarjetas -->
    <section class="cards">
      <div class="card"><h3>Administradores Activos</h3><p>3</p></div>
      <div class="card"><h3>Último acceso</h3><p>24/10/2025 - 10:34 AM</p></div>
      <div class="card"><h3>Permisos Asignados</h3><p>Completos</p></div>
    </section>

    <!-- Formulario de registro -->
    <section class="tabla-admin">
      <div class="titulo-tabla">
        <h2>🧑‍💼 Alta de Administradores</h2>
      </div>

      <form id="formAdmin" style="max-width:600px; margin:auto; text-align:left;">
        <label><strong>Nombre completo:</strong></label>
        <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>

        <label><strong>Correo electrónico:</strong></label>
        <input type="email" id="correo" placeholder="admin@perfumeShop.com" required>

        <label><strong>Clave de acceso:</strong></label>
        <input type="password" id="clave" placeholder="••••••••" minlength="6" required>

        <label><strong>Confirmar clave:</strong></label>
        <input type="password" id="confirmar" placeholder="••••••••" minlength="6" required>

        <label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <input type="checkbox" id="ubicacion">
          Activar permisos de ubicación
        </label>

        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button type="submit" class="btn-agregar">💾 Registrar</button>
          <button type="reset" class="btn-sesion" style="background:gray;">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('formAdmin');

    form.addEventListener('submit', e => {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const correo = document.getElementById('correo').value.trim();
      const clave = document.getElementById('clave').value;
      const confirmar = document.getElementById('confirmar').value;
      const ubicacion = document.getElementById('ubicacion').checked;

      // Validación de contraseña
      if (clave !== confirmar) {
        alert('⚠️ Las contraseñas no coinciden.');
        return;
      }

      // Confirmación general
      if (!confirm(`¿Deseas registrar al administrador ${nombre}?`)) return;

      // Permiso de ubicación
      if (ubicacion) {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => {
              const { latitude, longitude } = pos.coords;
              alert(`Administrador registrado ✅\n\nUbicación guardada:\nLat: ${latitude.toFixed(4)}, Lng: ${longitude.toFixed(4)}`);
            },
            err => {
              alert('⚠️ No se pudo obtener la ubicación: ' + err.message);
            }
          );
        } else {
          alert('❌ Tu navegador no soporta geolocalización.');
        }
      } else {
        alert('Administrador registrado sin permisos de ubicación ✅');
      }

      form.reset();
    });
  </script>

</body>
</html>
