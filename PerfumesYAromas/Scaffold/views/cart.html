<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Perfumes & Aromas</title>
    <link rel="stylesheet" href="../css/base.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="https://via.placeholder.com/32?text=P&A" type="image/x-icon">
    <style>
        :root {
            --primary-color: #25D366;
            --secondary-color: #9b5de5;
            --light-bg: #f8f9fa;
            --dark-text: #333;
            --border-color: #e0e0e0;
        }

        body {
            background-color: #f5f5f5;
            color: var(--dark-text);
        }

        .cart-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 40px;
            grid-column: 1 / -1;
        }

            .cart-header h1 {
                font-family: 'Playfair Display', serif;
                font-size: 2.5rem;
                color: #333;
                margin-bottom: 10px;
            }

            .cart-header p {
                color: #666;
                font-size: 1.1rem;
            }

        .cart-items {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 25px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

            .cart-item:last-child {
                border-bottom: none;
            }

        .item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-details h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #333;
        }

        .item-details p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: bold;
            color: var(--secondary-color);
            font-size: 1.1rem;
        }

        .quantity-display {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .quantity-box {
            width: 40px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-weight: bold;
        }

        .cart-summary {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 25px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

            .cart-summary h2 {
                margin-top: 0;
                font-family: 'Playfair Display', serif;
                color: #333;
                border-bottom: 2px solid var(--border-color);
                padding-bottom: 15px;
            }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .summary-total {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .checkout-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            width: 90%;
            margin-top: 20px;
        }

            .checkout-btn:hover {
                background: #1da851;
                transform: translateY(-2px);
            }

        .continue-btn {
            background: white;
            color: #333;
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

            .continue-btn:hover {
                background: var(--light-bg);
            }

        .micro-payment {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

            .micro-payment h3 {
                margin-top: 0;
                color: #555;
            }

        .micro-btn {
            background: #9b5de5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }

            .micro-btn:hover {
                background: #8a4bd1;
                transform: translateY(-2px);
            }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
                margin-top: 80px;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                grid-template-rows: auto auto;
            }

            .item-controls {
                grid-column: 1 / -1;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .cart-summary {
                position: static;
            }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <div class="cart-container">
        <div class="cart-header">
            <h1>Carro de Compras</h1>
            <p>Revisa tus productos antes de continuar</p>
        </div>

        <!-- ITEMS -->
        <div class="cart-items" id="cartItems">
            <p style="text-align:center; color:#888; padding:40px;">Cargando carrito...</p>
        </div>

        <!-- RESUMEN -->
        <div class="cart-summary">
            <h2>Resumen del Pedido</h2>

            <div class="summary-item">
                <span id="resumenCantidad">Subtotal (0 productos):</span>
                <span id="resumenSubtotal">$0.00</span>
            </div>

            <div class="summary-item">
                <span>Envío estándar:</span>
                <span>$5.00</span>
            </div>

            <div class="summary-total">
                <span>Total a pagar:</span>
                <span id="resumenTotal">$5.00</span>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <button class="checkout-btn" id="btnComprar" onclick="confirmarCompra()" style="display:block;width:100%;text-align:center;border:none;cursor:pointer;font-size:1rem;font-weight:bold;padding:14px;background:#25D366;color:white;border-radius:10px;margin-top:15px;">
                ✅ Confirmar Compra
            </button>

            <a href="catalog.html" class="continue-btn">
                ← Seguir Comprando
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" style="position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:8px;color:white;font-weight:bold;z-index:9999;opacity:0;transition:opacity 0.3s;"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        // Cargar navbar
        fetch('navbar.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;
                const dropdownBtn = document.querySelector('.dropdown-btn');
                const dropdownContent = document.querySelector('.dropdown-content');
                if (dropdownBtn && dropdownContent) {
                    dropdownBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        dropdownContent.classList.toggle('show');
                    });
                }
            });

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = type === 'error' ? '#e53935' : '#43a047';
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3500);
        }

        function getCarrito() {
            return JSON.parse(localStorage.getItem('carrito') || '[]');
        }
        function saveCarrito(carrito) {
            localStorage.setItem('carrito', JSON.stringify(carrito));
        }

        function renderCarrito() {
            const carrito = getCarrito();
            const container = document.getElementById('cartItems');

            if (carrito.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:50px 20px; color:#888;">
                        <p style="font-size:3rem;">🛒</p>
                        <h3>Tu carrito está vacío</h3>
                        <p>Agrega productos desde el <a href="catalog.html" style="color:#9b5de5;">catálogo</a></p>
                    </div>`;
                document.getElementById('btnComprar').style.display = 'none';
                actualizarResumen(carrito);
                return;
            }

            document.getElementById('btnComprar').style.display = 'block';

            container.innerHTML = carrito.map((item, i) => `
                <div class="cart-item">
                    <img src="${item.imagen_url || 'https://via.placeholder.com/100x100?text=Perfume'}"
                         class="item-image"
                         onerror="this.src='https://via.placeholder.com/100x100?text=Perfume'">
                    <div class="item-details">
                        <h3>${item.nombre}</h3>
                        <p>${item.marca || 'Marca propia'}</p>
                        <p class="item-price">$${item.precio.toFixed(2)}</p>
                        <div class="quantity-display">
                            <span>Cantidad:</span>
                            <button onclick="cambiarCantidad(${i}, -1)" style="background:#eee;border:1px solid #ccc;border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:1rem;">−</button>
                            <div class="quantity-box">${item.cantidad}</div>
                            <button onclick="cambiarCantidad(${i}, 1)" style="background:#eee;border:1px solid #ccc;border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:1rem;">+</button>
                        </div>
                    </div>
                    <div class="item-controls">
                        <p style="font-weight:bold;color:#333;font-size:1.1rem;">$${(item.precio * item.cantidad).toFixed(2)}</p>
                        <button class="remove-btn" onclick="eliminarItem(${i})" style="background:none;border:none;color:#ff4444;cursor:pointer;">
                            🗑️ Eliminar
                        </button>
                    </div>
                </div>
            `).join('');

            actualizarResumen(carrito);
        }

        function actualizarResumen(carrito) {
            const totalItems = carrito.reduce((s, item) => s + item.cantidad, 0);
            const subtotal = carrito.reduce((s, item) => s + item.precio * item.cantidad, 0);
            const envio = carrito.length > 0 ? 5 : 0;
            const total = subtotal + envio;

            document.getElementById('resumenCantidad').textContent = `Subtotal (${totalItems} producto${totalItems !== 1 ? 's' : ''}):`;
            document.getElementById('resumenSubtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('resumenTotal').textContent = `$${total.toFixed(2)}`;
        }

        function cambiarCantidad(index, delta) {
            const carrito = getCarrito();
            if (!carrito[index]) return;
            carrito[index].cantidad += delta;
            if (carrito[index].cantidad < 1) carrito[index].cantidad = 1;
            if (carrito[index].cantidad > (carrito[index].stock || 999)) {
                carrito[index].cantidad = carrito[index].stock || 999;
                showToast('Stock máximo alcanzado', 'error');
            }
            saveCarrito(carrito);
            renderCarrito();
        }

        function eliminarItem(index) {
            const carrito = getCarrito();
            carrito.splice(index, 1);
            saveCarrito(carrito);
            renderCarrito();
            showToast('Producto eliminado del carrito');
        }

        async function confirmarCompra() {
            const carrito = getCarrito();
            if (carrito.length === 0) return;

            if (!confirm('¿Confirmar la compra de ' + carrito.reduce((s,i) => s+i.cantidad, 0) + ' producto(s)?')) return;

            const btn = document.getElementById('btnComprar');
            btn.textContent = '⏳ Procesando...';
            btn.disabled = true;

            try {
                const items = carrito.map(item => ({
                    producto_id: item.producto_id,
                    cantidad: item.cantidad
                }));

                const res = await fetch(`${API_BASE}/comprar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.removeItem('carrito');
                    showToast('✅ ¡Compra realizada con éxito!');

                    renderCarrito();
                    // Redirigir a confirmación después de un momento
                    setTimeout(() => {
                        const customerData = {
                            total: '$' + carrito.reduce((s,i) => s + i.precio * i.cantidad, 0).toFixed(2),
                            timestamp: new Date().toISOString()
                        };
                        localStorage.setItem('customerData', JSON.stringify(customerData));
                        window.location.href = 'confirmacionpago.html';
                    }, 1500);
                } else {
                    showToast('❌ ' + (data.error || 'Error al procesar'), 'error');
                }
            } catch (err) {
                showToast('❌ Error de conexión: ' + err.message, 'error');
            } finally {
                btn.textContent = '✅ Confirmar Compra';
                btn.disabled = false;
            }
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', renderCarrito);
    </script>
</body>
</html>
