<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Perfumes NE2</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">🌺</div>
                <h1>Perfumes NE2</h1>
                <p>Sistema de Gestión</p>
                <p class="acceso-restringido">ACCESO RESTRINGIDO</p>
            </div>

            <form id="formLogin" class="login-form" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="email">📧 Correo Electrónico</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="tu-email@perfumesne2.com"
                           required
                           autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required
                           autocomplete="current-password">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="recordar" name="recordar">
                    <label for="recordar">Recordarme en este dispositivo</label>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    🔐 Iniciar Sesión
                </button>

                <button type="button" class="btn-back" id="btnRegresar" onclick="window.location.href='catalog.html'">
                    Regresar
                </button>

                <!-- Loader -->
                <div id="loader" class="loader"></div>

                <!-- Mensajes -->
                <div id="mensajeError" class="mensaje-error"></div>
                <div id="mensajeExito" class="mensaje-exito"></div>
            </form>

            <div class="login-footer">
                <div style="margin-top: 20px; font-size: 0.85rem; text-align: center;">
                    <p style="margin: 5px 0;">
                        ¿Olvidaste tu contraseña?
                        <a href="#">Recuperar acceso</a>
                    </p>
                    <p style="margin: 10px 0 0; color: #7e57c2; font-size: 0.8rem; border-top: 1px dashed #e0e0e0; padding-top: 10px;">
                        <strong>Accesos del sistema:</strong> Administrador, Vendedor, Estadística
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/adminlogin.js"></script>
</body>
</html>
